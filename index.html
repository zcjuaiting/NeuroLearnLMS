<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuroLearn - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Baloo+2:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>

</head>
<body>

<!-- =================== LOGIN SCREEN =================== -->
<div id="login-screen" class="screen active">
    <div style="display:flex;flex-direction:column;align-items:center;width:100%;">
        <div class="brand">
            <h1>NeuroLearn</h1>
            <p>Smart learning for every young mind 🧠</p>
        </div>

        <!-- Login Form -->
        <div class="auth-card">
            <h2>Hello! Welcome Back!</h2>
            <p class="subtitle">Let's Login to Your Account</p>
            
            <!-- Email Input -->
            <div class="form-group">
                <label>Email Address</label>
                <input 
                    type="email" 
                    id="login-email" 
                    placeholder="Enter your email" 
                    autocomplete="email"
                    required>
            </div>

            <!-- Password Input -->
            <div class="form-group">
                <label>Password</label>
                <input 
                    type="password" 
                    id="login-password" 
                    placeholder="Enter your password" 
                    autocomplete="current-password"
                    required>
            </div>

             <!-- reCAPTCHA -->
            <div class="form-group" style="display:flex;justify-content:center;margin:20px 0;">
                <div
                    class="g-recaptcha"
                    data-sitekey="6LfdHlwtAAAAAPCdBOCofU7zObfMOhq52MPYnJ2v">
                </div>
            </div>

            <!-- Login Button -->
            <button class="btn-primary" id="login-btn" onclick="handleLogin()">
                Login
            </button>

            <!-- Forgot Password Link -->
            <p style="text-align:right;margin-top:8px;font-size:0.8rem;">
                <a href="#" onclick="showToast('Password reset link sent to your email! 📧', '#4CAF7D')" 
                   style="color:var(--text-light);text-decoration:none;">
                    Forgot password?
                </a>
            </p>

            <!-- Sign Up Link -->
            <p class="auth-switch">
                Don't have an account? 
                <a href="signup.html">Create one!</a>
            </p>
        </div>
    </div>
</div>

<!-- Toast Notification -->
<div class="toast" id="toast"></div>

<!-- ============================================ -->
<!-- SUPABASE SCRIPTS -->
<!-- ============================================ -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<script src="script.js"></script>

</body>
</html>
