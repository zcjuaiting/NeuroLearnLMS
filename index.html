<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuroLearn - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Baloo+2:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- =================== LOGIN SCREEN =================== -->
<div id="login-screen" class="screen active">
    <div style="display:flex;flex-direction:column;align-items:center;width:100%;">
        <div class="brand">
            <h1>NeuroLearn</h1>
            <p>Smart learning for every young mind 🧠</p>
        </div>

        <!-- Login Form -->
        <div class="auth-card" id="login-form">
            <h2>Hello! Welcome Back!</h2>
            <p class="subtitle">Let's Login to Your Account</p>
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="login-username" placeholder="Enter your username" value="Jake"/>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="login-password" placeholder="Enter your password" value="••••••"/>
            </div>
            <button class="btn-primary" onclick="goToDashboard()">Login</button>
            <p class="auth-switch">Don't have an account? <a onclick="showRegister()">Create one!</a></p>
        </div>

        <!-- Register Form (hidden by default) -->
        <div class="auth-card" id="register-form" style="display:none;">
            <h2>Hello!</h2>
            <p class="subtitle">Create your account</p>
            <div class="form-group">
                <label>Email</label>
                <input type="email" placeholder="Enter your email"/>
            </div>
            <div class="form-group">
                <label>Username</label>
                <input type="text" placeholder="Choose a username"/>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" placeholder="Create a password"/>
            </div>
            <div class="role-selector">
                <button class="role-btn active" onclick="selectRole(this)">As student</button>
                <button class="role-btn" onclick="selectRole(this)">As admin</button>
                <button class="role-btn" onclick="selectRole(this)">As parent</button>
            </div>
            <button class="btn-primary" onclick="goToDashboard()">Create Account</button>
            <p class="auth-switch">Already have an account? <a onclick="showLogin()">Login here!</a></p>
        </div>
    </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script src="script.js"></script>
</body>
</html>
