<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Lesson</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="screen-container">
        <div class="header">
            <div class="user-group">
                <div class="avatar-circle">
                    <div class="avatar-icon"></div>
                </div>
                <div class="user-name">Jake</div>
            </div>
            <div class="settings-btn">⚙️</div>
        </div>

        <div class="subject-row">
            <div class="subject-title">Math</div>
            <div class="tag-addition">Addition</div>
        </div>

        <div class="quiz-card">
            <div class="question-box">
                <div class="question-text">1 + 2 = ?</div>
            </div>

            <button class="option-button">
                <span class="option-text">3</span>
                <span class="letter-badge">A</span>
            </button>

            <button class="option-button">
                <span class="option-text">4</span>
                <span class="letter-badge">B</span>
            </button>

            <button class="option-button">
                <span class="option-text">5</span>
                <span class="letter-badge">C</span>
            </button>

            <div class="progress-title">Progress</div>
            <div class="progress-subcard">
                <div class="stats-left">
                    <span class="medal-icon">🏅</span>
                    <div class="score-text">
                        Points: <span>100</span><br>
                        Streak: <span>3 🔥</span>
                    </div>
                </div>
                <button class="btn-average">Stats</button>
            </div>
        </div>

        <div class="bottom-illustration"></div>
    </div>

    <script src="lesson script.js"></script>
</body>
</html>
