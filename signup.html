<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuroLearn - Sign Up</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Baloo+2:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
</head>
<body>

<!-- =================== SIGNUP SCREEN =================== -->
<div id="signup-screen" class="screen active">
    <div style="display:flex;flex-direction:column;align-items:center;width:100%;">
        <div class="brand">
            <h1>NeuroLearn</h1>
            <p>Smart learning for every young mind 🧠</p>
        </div>

        <!-- Sign Up Form -->
        <div class="auth-card">
            <h2>Create Your Account!</h2>
            <p class="subtitle">Join NeuroLearn today</p>

            <!-- Display Name -->
            <div class="form-group">
                <label>Display Name</label>
                <input 
                    type="text" 
                    id="signup-displayname" 
                    placeholder="What should we call you?" 
                    autocomplete="name"
                    required>
            </div>

            <!-- Email -->
            <div class="form-group">
                <label>Email Address</label>
                <input 
                    type="email" 
                    id="signup-email" 
                    placeholder="Enter your email" 
                    autocomplete="email"
                    required>
            </div>

            <!-- Password -->
            <div class="form-group">
                <label>Password</label>
                <input 
                    type="password" 
                    id="signup-password" 
                    placeholder="Create a password (min. 6 characters)" 
                    autocomplete="new-password"
                    required>
                <small style="color:var(--text-light);font-size:0.7rem;margin-top:4px;display:block;">
                    🔒 Password must be at least 6 characters
                </small>
            </div>

            <!-- Confirm Password -->
            <div class="form-group">
                <label>Confirm Password</label>
                <input 
                    type="password" 
                    id="signup-confirm-password" 
                    placeholder="Confirm your password" 
                    autocomplete="new-password"
                    required>
            </div>

            <!-- Role Selector -->
            <div class="role-selector">
                <button class="role-btn active" onclick="selectRole(this)" data-role="student">🧒 Student</button>
                <button class="role-btn" onclick="selectRole(this)" data-role="parent">👩 Parent</button>
                <button class="role-btn" onclick="selectRole(this)" data-role="admin">🔧 Admin</button>
            </div>

            <!-- reCAPTCHA -->
            <div class="form-group" style="display:flex;justify-content:center;margin:20px 0;">
                <div
                    class="g-recaptcha"
                    data-sitekey="6LfdHlwtAAAAAPCdBOCofU7zObfMOhq52MPYnJ2v">
                </div>
            </div>

            <!-- Sign Up Button -->
            <button class="btn-primary" id="signup-btn" onclick="handleSignup()">
                Create Account
            </button>

            <!-- Login Link -->
            <p class="auth-switch">
                Already have an account? 
                <a href="index.html">Login here!</a>
            </p>
        </div>
    </div>
</div>

<!-- Toast Notification -->
<div class="toast" id="toast"></div>

<!-- ============================================ -->
<!-- SUPABASE SCRIPTS -->
<!-- ============================================ -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<script src="script.js"></script>

</body>
</html>
